<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./apostila-javascript-premium.html">
  <title>Apostila JavaScript Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      animation: fadeIn 1s ease;
    }
    p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    a {
      color: white;
      text-decoration: underline;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Apostila JavaScript Premium</h1>
    <p>Redirecionando...</p>
    <div class="loader"></div>
    <p style="margin-top: 30px; font-size: 14px;">
      Se não for redirecionado automaticamente, 
      <a href="./apostila-javascript-premium.html">clique aqui</a>
    </p>
  </div>
  
  <script>
    // Redirecionar após 1 segundo
    setTimeout(() => {
      window.location.href = './apostila-javascript-premium.html';
    }, 1000);
  </script>
</body>
</html>
